<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachFinder - Search Institutes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-4">Search Job & Software Coaching</h2>
        
        <div class="row g-3 bg-white p-4 shadow-sm rounded mb-4">
            <div class="col-md-5">
                <input type="text" id="cityInput" class="form-control" placeholder="Enter City (e.g., Hyderabad)">
            </div>
            <div class="col-md-5">
                <select id="categoryInput" class="form-select">
                    <option value="">All Categories</option>
                    <option value="Government">Government Jobs</option>
                    <option value="Software">Software Coaching</option>
                </select>
            </div>
            <div class="col-md-2">
                <button onclick="search()" class="btn btn-primary w-100">Search</button>
            </div>
        </div>

        <div class="table-responsive bg-white p-3 shadow-sm rounded">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Course</th>
                        <th>City</th>
                        <th>Rating</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function search() {
            const city = document.getElementById('cityInput').value;
            const category = document.getElementById('categoryInput').value;
            const tbody = document.getElementById('resultsBody');
            
            // Show loading
            tbody.innerHTML = '<tr><td colspan="5" class="text-center">Loading...</td></tr>';

            try {
                // Fetch data from our FastAPI backend
                const response = await fetch(`http://127.0.0.1:8000/search?city=${city}&category=${category}`);
                const data = await response.json();

                tbody.innerHTML = ''; // Clear table
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">No institutes found.</td></tr>';
                    return;
                }

                data.forEach(item => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${item.name}</td>
                            <td><span class="badge bg-info text-dark">${item.category}</span></td>
                            <td>${item.course}</td>
                            <td>${item.city}</td>
                            <td>⭐ ${item.rating}</td>
                        </tr>
                    `;
                });
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Error connecting to backend.</td></tr>';
            }
        }
        
        // Load all data when page opens
        window.onload = search;
    </script>
</body>
</html>
